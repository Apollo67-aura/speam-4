
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEAM+</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="logo">SPEAM</div>

  <div class="menu">
    <a href="#">LOJA</a>
    <a href="#">BIBLIOTECA</a>
    <a href="#">COMUNIDADE</a>
  </div>

  <div class="profile">
    <span id="user">Player</span>
  </div>
</div>

<section class="hero">
  <div class="hero-overlay"></div>

  <div class="hero-content">
    <h1>CYBER FUTURE 2078</h1>

    <p>
      Explore uma megacidade futurista dominada por corporações.
    </p>

    <div class="hero-buttons">
      <button onclick="watchTrailer()">VER TRAILER</button>
      <button onclick="buyNow()">COMPRAR AGORA</button>
    </div>
  </div>
</section>

<div id="trailerModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeTrailer()">×</span>

    <iframe
      id="trailerFrame"
      width="100%"
      height="100%"
      src=""
      title="Trailer"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>
</div>

<section class="section">
  <h2>JOGOS EM DESTAQUE</h2>

  <div class="grid">

    <div class="card">
      <div class="thumb t1"></div>

      <div class="card-content">
        <h3>Cyber Future</h3>
        <p>R$ 149,90</p>

        <button onclick="buyGame('Cyber Future')">
          Comprar
        </button>
      </div>
    </div>

    <div class="card">
      <div class="thumb t2"></div>

      <div class="card-content">
        <h3>Shadow Arena</h3>
        <p>R$ 59,90</p>

        <button onclick="buyGame('Shadow Arena')">
          Comprar
        </button>
      </div>
    </div>

  </div>
</section>

<section class="section">
  <h2>CARRINHO</h2>

  <div id="cart"></div>

  <div class="checkout">
    <button onclick="checkout()">
      FINALIZAR COMPRA
    </button>
  </div>
</section>

<div id="notification"></div>

<script src="script.js"></script>

</body>
</html>
